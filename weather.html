<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta name="description" content="GioNews Weather - St. Charles, MO forecasts">
    <title>GioNews Weather - St. Charles, MO</title>

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700;800;900&family=Playfair+Display:ital,wght@0,700;0,900;1,700&display=swap" rel="stylesheet">
    
    <link rel="icon" type="image/png" href="favicon.png">
    <link rel="icon" type="image/x-icon" href="favicon.ico">

<style>
    :root {
        --primary: #0a0f1a;
        --primary-light: #111827;
        --accent: #3b82f6;
        --accent-hover: #2563eb;
        --accent-glow: rgba(59, 130, 246, 0.4);
        --warning: #f59e0b;
        --warning-glow: rgba(245, 158, 11, 0.4);
        --danger: #ef4444;
        --text: #f8fafc;
        --text-muted: #94a3b8;
        --bg: #020617;
        --card-bg: rgba(15, 23, 42, 0.6);
        --glass: rgba(15, 23, 42, 0.4);
        --border: rgba(148, 163, 184, 0.1);
        --border-glow: rgba(59, 130, 246, 0.2);
        
        --shadow-sm: 0 2px 8px rgba(0, 0, 0, 0.3);
        --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.15);
        --shadow-lg: 0 25px 50px -12px rgba(0, 0, 0, 0.5);
        
        --radius: 16px;
        --radius-sm: 12px;
        --transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
    }

    body.light-mode {
        --primary: #ffffff;
        --primary-light: #f8fafc;
        --text: #0f172a;
        --text-muted: #64748b;
        --bg: #f1f5f9;
        --card-bg: rgba(255, 255, 255, 0.7);
        --glass: rgba(255, 255, 255, 0.5);
        --border: rgba(148, 163, 184, 0.2);
        --border-glow: rgba(59, 130, 246, 0.15);
        --shadow-glow: 0 0 40px rgba(59, 130, 246, 0.1);
    }

    * { margin: 0; padding: 0; box-sizing: border-box; }
    html { scroll-behavior: smooth; }

    body {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        background: var(--bg);
        background-image: 
            radial-gradient(ellipse at 20% 0%, rgba(59, 130, 246, 0.12) 0%, transparent 50%),
            radial-gradient(ellipse at 80% 100%, rgba(30, 58, 138, 0.08) 0%, transparent 50%);
        background-attachment: fixed;
        color: var(--text);
        line-height: 1.6;
        min-height: 100vh;
        -webkit-font-smoothing: antialiased;
        overflow-x: hidden;
    }

    body::before {
        content: '';
        position: fixed;
        top: 0; left: 0; right: 0; bottom: 0;
        background: url("data:image/svg+xml,%3Csvg viewBox='0 0 400 400' xmlns='http://www.w3.org/2000/svg'%3E%3Cfilter id='noiseFilter'%3E%3CfeTurbulence type='fractalNoise' baseFrequency='0.9' numOctaves='3' stitchTiles='stitch'/%3E%3C/filter%3E%3Crect width='100%25' height='100%25' filter='url(%23noiseFilter)'/%3E%3C/svg%3E");
        opacity: 0.03;
        pointer-events: none;
        z-index: 1;
    }

    body.light-mode::before { opacity: 0.02; }

    header, .top-nav {
        background: var(--glass);
        backdrop-filter: blur(20px) saturate(180%);
        -webkit-backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--border);
        position: fixed;
        top: 0;
        left: 0;
        width: 100%;
        z-index: 1000;
        transition: var(--transition), background 0.3s, box-shadow 0.3s;
    }

    header::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, rgba(255,255,255,0.2), transparent);
    }

    body.light-mode header, body.light-mode .top-nav { 
        background: rgba(255, 255, 255, 0.8);
    }
    
    .top-nav.scrolled, header.scrolled {
        background: rgba(255,255,255,0.9);
        box-shadow: 0 2px 5px rgba(0,0,0,0.1);
    }
    
    header.hide-mobile { transform: translateY(-100%); }

    .header-content {
        max-width: 1400px;
        margin: 0 auto;
        padding: 16px 24px;
        display: flex;
        justify-content: space-between;
        align-items: center;
        position: relative;
        z-index: 2;
    }

    .brand { 
        display: flex; 
        align-items: center;
        position: relative;
    }
    
    .brand::after {
        content: '';
        position: absolute;
        bottom: -8px; left: 0;
        width: 100%; height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        transform: scaleX(0);
        transition: var(--transition);
    }
    
    .brand:hover::after { transform: scaleX(1); }

    .logo-img { height: 48px; width: auto; display: block; filter: drop-shadow(0 4px 6px rgba(0,0,0,0.1)); }

    .nav-desktop { display: flex; gap: 12px; align-items: center; }

    .nav-pill {
        display: flex;
        gap: 4px;
        background: var(--card-bg);
        padding: 6px;
        border-radius: 100px;
        border: 1px solid var(--border);
        box-shadow: var(--shadow-sm), inset 0 1px 0 rgba(255,255,255,0.05);
        position: relative;
        overflow: hidden;
    }

    .nav-pill a {
        color: var(--text-muted);
        text-decoration: none;
        padding: 10px 22px;
        font-size: 13px;
        font-weight: 600;
        border-radius: 100px;
        transition: var(--transition);
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .nav-pill a:hover, .nav-pill a.active {
        background: linear-gradient(135deg, var(--accent), var(--accent-hover));
        color: #ffffff;
        box-shadow: 0 4px 20px var(--accent-glow), 0 0 0 1px rgba(255,255,255,0.1) inset;
        transform: translateY(-1px);
    }
    .nav-pill a {
        position: relative;
    }
    .nav-pill a::after {
        content: '';
        position: absolute;
        bottom: 0; left: 0;
        width: 0; height: 2px;
        background: var(--accent);
        transition: width 0.3s ease;
    }
    .nav-pill a:hover::after, .nav-pill a.active::after {
        width: 100%;
    }

    .theme-toggle {
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text);
        width: 44px; height: 44px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 20px;
        transition: var(--transition);
        display: flex; align-items: center; justify-content: center;
        margin-left: 8px;
    }

    .theme-toggle:hover { 
        background: var(--accent); 
        border-color: var(--accent); 
        transform: scale(1.1) rotate(5deg);
        box-shadow: 0 0 30px var(--accent-glow);
    }

    .nav-toggle {
        display: none;
        background: var(--card-bg);
        border: 1px solid var(--border);
        color: var(--text);
        width: 44px; height: 44px;
        border-radius: 12px;
        cursor: pointer;
        font-size: 20px;
        transition: var(--transition);
    }

    .nav-toggle:hover { 
        background: var(--accent); 
        border-color: var(--accent);
        box-shadow: 0 0 20px var(--accent-glow);
    }

    .nav-mobile {
        display: none;
        position: absolute;
        top: 100%; left: 0; right: 0;
        background: rgba(15, 23, 42, 0.98);
        backdrop-filter: blur(20px) saturate(180%);
        border-bottom: 1px solid var(--border);
        padding: 24px;
        flex-direction: column;
        gap: 8px;
        box-shadow: var(--shadow);
    }

    body.light-mode .nav-mobile { background: rgba(255, 255, 255, 0.98); }
    .nav-mobile.active { display: flex; }

    .nav-mobile a {
        color: var(--text-muted);
        text-decoration: none;
        padding: 16px 20px;
        font-size: 16px;
        font-weight: 600;
        border-radius: 12px;
        transition: var(--transition);
        background: var(--card-bg);
        border: 1px solid var(--border);
    }

    .nav-mobile a:hover {
        background: var(--primary-light);
        color: var(--text);
        border-color: var(--border-glow);
        transform: translateX(8px);
    }

    .container { 
        max-width: 1400px; 
        margin: 0 auto; 
        padding: 90px 24px 32px; 
        position: relative; 
        z-index: 2; 
    }

    /* Attention Sticker */
    .attention-sticker {
        background: linear-gradient(135deg, rgba(245, 158, 11, 0.15), rgba(245, 158, 11, 0.05));
        border: 2px solid var(--warning);
        border-radius: var(--radius);
        padding: 24px 28px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
        box-shadow: 0 4px 20px rgba(245, 158, 11, 0.15);
        display: flex;
        align-items: flex-start;
        gap: 20px;
    }

    .attention-sticker::before {
        content: '';
        position: absolute;
        top: 0; left: 0; width: 6px; height: 100%;
        background: linear-gradient(to bottom, var(--warning), #d97706);
        box-shadow: 0 0 20px var(--warning-glow);
    }

    .attention-icon {
        width: 56px; height: 56px;
        background: linear-gradient(135deg, var(--warning), #d97706);
        border-radius: 50%;
        display: flex;
        align-items: center;
        justify-content: center;
        font-size: 28px;
        flex-shrink: 0;
        box-shadow: 0 4px 20px var(--warning-glow);
        animation: attentionPulse 2s infinite;
    }

    @keyframes attentionPulse {
        0%, 100% { box-shadow: 0 4px 20px var(--warning-glow); transform: scale(1); }
        50% { box-shadow: 0 4px 30px var(--warning-glow), 0 0 20px rgba(245, 158, 11, 0.4); transform: scale(1.05); }
    }

    .attention-content h3 {
        font-size: 18px;
        font-weight: 800;
        color: var(--warning);
        margin-bottom: 8px;
        text-transform: uppercase;
        letter-spacing: 1px;
    }

    .attention-content p {
        font-size: 15px;
        color: var(--text);
        line-height: 1.6;
        font-weight: 500;
    }

    .attention-content strong {
        color: var(--warning);
        font-weight: 700;
    }

    .last-updated {
        margin-top: 12px;
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 600;
        text-transform: uppercase;
        letter-spacing: 0.5px;
    }

    .current-weather {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 48px;
        margin-bottom: 32px;
        position: relative;
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: cardFadeIn 0.6s ease-out;
    }

    .current-weather:hover {
        transform: translateY(-8px);
        box-shadow: var(--shadow-lg), 0 0 60px rgba(59, 130, 246, 0.2);
        border-color: var(--border-glow);
    }

    .current-weather::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), transparent);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
        z-index: 1;
    }
    
    .current-weather:hover::before { opacity: 1; }

    @keyframes cardFadeIn {
        from {
            opacity: 0;
            transform: translateY(20px);
        }
        to {
            opacity: 1;
            transform: translateY(0);
        }
    }

    .weather-header {
        display: flex;
        justify-content: space-between;
        align-items: flex-start;
        margin-bottom: 32px;
    }

    .location-info h1 {
        font-family: 'Playfair Display', serif;
        font-size: 42px;
        font-weight: 900;
        margin-bottom: 8px;
        letter-spacing: -1px;
    }

    .location-info .subtitle {
        font-size: 14px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 2px;
        font-weight: 600;
    }

    .alert-badge {
        background: linear-gradient(135deg, #22c55e, #16a34a);
        color: white;
        padding: 10px 20px;
        border-radius: 100px;
        font-size: 12px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: 1px;
        box-shadow: 0 4px 15px rgba(34, 197, 94, 0.3);
        display: flex;
        align-items: center;
        gap: 8px;
    }

    .alert-badge::before {
        content: '';
        width: 8px; height: 8px;
        background: white;
        border-radius: 50%;
        animation: statusPulse 2s infinite;
    }

    @keyframes statusPulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
    }

    .weather-main {
        display: flex;
        align-items: center;
        gap: 48px;
        margin-bottom: 40px;
    }

    .weather-icon-large {
        font-size: 140px;
        line-height: 1;
        filter: drop-shadow(0 0 40px rgba(59, 130, 246, 0.3));
        animation: float 4s ease-in-out infinite;
    }

    @keyframes float {
        0%, 100% { transform: translateY(0); }
        50% { transform: translateY(-15px); }
    }

    .temp-display {
        flex: 1;
    }

    .current-temp {
        font-family: 'Playfair Display', serif;
        font-size: 120px;
        font-weight: 900;
        line-height: 1;
        background: linear-gradient(135deg, #ffffff 0%, var(--accent) 100%);
        -webkit-background-clip: text;
        -webkit-text-fill-color: transparent;
        background-clip: text;
        margin-bottom: 8px;
    }

    .feels-like {
        font-size: 18px;
        color: var(--text-muted);
        font-weight: 600;
    }

    .condition-text {
        font-size: 28px;
        font-weight: 700;
        color: var(--text);
        margin-top: 16px;
    }

    .weather-grid {
        display: grid;
        grid-template-columns: repeat(4, 1fr);
        gap: 24px;
        padding-top: 32px;
        border-top: 1px solid var(--border);
    }

    .weather-stat {
        text-align: center;
        padding: 20px;
        background: rgba(255,255,255,0.03);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .weather-stat::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.08), transparent);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
    }

    .weather-stat:hover {
        background: rgba(59, 130, 246, 0.12);
        border-color: var(--border-glow);
        transform: translateY(-6px);
        box-shadow: 0 15px 30px rgba(59, 130, 246, 0.15);
    }
    
    .weather-stat:hover::before { opacity: 1; }

    .stat-label {
        font-size: 12px;
        color: var(--text-muted);
        text-transform: uppercase;
        letter-spacing: 1px;
        margin-bottom: 12px;
        font-weight: 600;
    }

    .stat-value {
        font-size: 24px;
        font-weight: 800;
        color: var(--text);
    }

    /* Forecast Section */
    .section-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 24px;
        padding-bottom: 16px;
        border-bottom: 1px solid var(--border);
        position: relative;
    }

    .section-header::after {
        content: '';
        position: absolute;
        bottom: -1px; left: 0;
        width: 80px; height: 2px;
        background: linear-gradient(90deg, var(--accent), var(--accent-hover));
        box-shadow: 0 0 10px var(--accent-glow);
    }

    .section-title {
        font-size: 24px;
        font-weight: 800;
        text-transform: uppercase;
        letter-spacing: -0.5px;
    }

    .forecast-grid {
        display: grid;
        grid-template-columns: repeat(5, 1fr);
        gap: 16px;
        margin-bottom: 32px;
    }

    .forecast-day {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px 16px;
        text-align: center;
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        cursor: pointer;
        position: relative;
        overflow: hidden;
        animation: cardFadeIn 0.6s ease-out;
        animation-fill-mode: both;
    }

    .forecast-day:nth-child(1) { animation-delay: 0.1s; }
    .forecast-day:nth-child(2) { animation-delay: 0.15s; }
    .forecast-day:nth-child(3) { animation-delay: 0.2s; }
    .forecast-day:nth-child(4) { animation-delay: 0.25s; }
    .forecast-day:nth-child(5) { animation-delay: 0.3s; }

    .forecast-day::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.05), transparent);
        opacity: 0;
        transition: opacity 0.4s ease;
        pointer-events: none;
    }

    .forecast-day:hover {
        transform: translateY(-10px);
        border-color: var(--border-glow);
        box-shadow: 0 20px 40px rgba(59, 130, 246, 0.25), 0 0 50px rgba(59, 130, 246, 0.15);
    }
    
    .forecast-day:hover::before { opacity: 1; }

    .day-name {
        font-size: 14px;
        font-weight: 700;
        text-transform: uppercase;
        letter-spacing: 1px;
        color: var(--text-muted);
        margin-bottom: 16px;
    }

    .day-icon {
        font-size: 48px;
        margin-bottom: 16px;
        line-height: 1;
    }

    .day-temps {
        margin-bottom: 12px;
    }

    .day-high {
        font-size: 24px;
        font-weight: 800;
        color: var(--text);
    }

    .day-low {
        font-size: 16px;
        font-weight: 600;
        color: var(--text-muted);
        margin-left: 8px;
    }

    .day-condition {
        font-size: 13px;
        color: var(--text-muted);
        font-weight: 600;
    }

    .hourly-container {
        background: var(--card-bg);
        border: 1px solid var(--border);
        border-radius: var(--radius);
        padding: 24px;
        margin-bottom: 32px;
        box-shadow: var(--shadow);
        transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        animation: cardFadeIn 0.6s ease-out 0.2s backwards;
    }

    .hourly-container:hover {
        box-shadow: 0 15px 35px rgba(59, 130, 246, 0.2), 0 0 50px rgba(59, 130, 246, 0.1);
        border-color: rgba(59, 130, 246, 0.3);
    }

    .hourly-scroll {
        display: flex;
        gap: 16px;
        overflow-x: auto;
        padding-bottom: 8px;
        scrollbar-width: thin;
        scrollbar-color: var(--accent) var(--primary);
    }

    .hourly-scroll::-webkit-scrollbar {
        height: 6px;
    }

    .hourly-scroll::-webkit-scrollbar-track {
        background: var(--primary);
        border-radius: 3px;
    }

    .hourly-scroll::-webkit-scrollbar-thumb {
        background: var(--accent);
        border-radius: 3px;
    }

    .hour-item {
        flex: 0 0 auto;
        width: 80px;
        text-align: center;
        padding: 16px 12px;
        background: rgba(255,255,255,0.03);
        border-radius: var(--radius-sm);
        border: 1px solid var(--border);
        transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        position: relative;
        overflow: hidden;
    }

    .hour-item::before {
        content: '';
        position: absolute;
        inset: 0;
        background: linear-gradient(135deg, rgba(59, 130, 246, 0.1), transparent);
        opacity: 0;
        transition: opacity 0.3s ease;
        pointer-events: none;
    }

    .hour-item:hover {
        background: rgba(59, 130, 246, 0.15);
        border-color: var(--border-glow);
        transform: translateY(-6px);
        box-shadow: 0 10px 25px rgba(59, 130, 246, 0.2);
    }
    
    .hour-item:hover::before { opacity: 1; }

    .hour-time {
        font-size: 13px;
        font-weight: 700;
        color: var(--text-muted);
        margin-bottom: 12px;
    }

    .hour-icon {
        font-size: 28px;
        margin-bottom: 12px;
    }

    .hour-temp {
        font-size: 18px;
        font-weight: 800;
        color: var(--text);
    }

    footer {
        background: var(--primary);
        border-top: 1px solid var(--border);
        padding: 48px 24px;
        text-align: center;
        margin-top: 64px;
        position: relative;
    }
    
    footer::before {
        content: '';
        position: absolute;
        top: 0; left: 0; right: 0; height: 1px;
        background: linear-gradient(90deg, transparent, var(--accent), transparent);
        opacity: 0.5;
    }

    .footer-logo { margin-bottom: 24px; }
    .footer-logo img { height: 48px; width: auto; opacity: 0.9; }

    .footer-links { 
        display: flex; 
        justify-content: center; 
        gap: 32px; 
        margin-bottom: 24px; 
        flex-wrap: wrap;
    }
    
    .footer-links a { 
        color: var(--text-muted); 
        text-decoration: none; 
        font-size: 14px; 
        font-weight: 600; 
        transition: var(--transition);
    }
    
    .footer-links a:hover { color: var(--accent); }

    footer p { 
        color: var(--text-muted); 
        font-size: 13px;
        opacity: 0.8;
    }

    @media (max-width: 1024px) {
        .weather-grid { grid-template-columns: repeat(2, 1fr); }
        .forecast-grid { grid-template-columns: repeat(3, 1fr); }
        .current-temp { font-size: 80px; }
        .weather-icon-large { font-size: 100px; }
        .container { padding: 110px 24px 32px; }
    }

    @media (max-width: 768px) {
        .nav-desktop { display: none; }
        .nav-toggle { display: flex; align-items: center; justify-content: center; }
        .attention-sticker { flex-direction: column; text-align: center; }
        .attention-icon { margin: 0 auto; }
        .weather-main { flex-direction: column; text-align: center; }
        .weather-header { flex-direction: column; gap: 16px; }
        .weather-grid { grid-template-columns: 1fr; }
        .forecast-grid { grid-template-columns: repeat(2, 1fr); }
        .current-weather { padding: 32px 24px; }
        .location-info h1 { font-size: 28px; }
        .current-temp { font-size: 64px; }

    <script>
        function toggleMobileNav() {
            const mobileNav = document.getElementById('mobileNav');
            const toggle = document.querySelector('.nav-toggle');
            mobileNav.classList.toggle('active');
            toggle.textContent = mobileNav.classList.contains('active') ? '✕' : '☰';
        }

        function toggleDarkMode() {
            document.body.classList.toggle('light-mode');
            const isLight = document.body.classList.contains('light-mode');
            localStorage.setItem('theme', isLight ? 'light' : 'dark');
            updateThemeIcons();
        }

        function updateThemeIcons() {
            const isLight = document.body.classList.contains('light-mode');
            const desktopBtn = document.querySelector('.theme-toggle');
            const mobileLink = document.getElementById('mobileThemeToggle');
            if (desktopBtn) desktopBtn.textContent = isLight ? '☀️' : '🌙';
            if (mobileLink) mobileLink.textContent = isLight ? '🌙 Dark Mode' : '☀️ Light Mode';
        }

        if (localStorage.getItem('theme') === 'light') {
            document.body.classList.add('light-mode');
            updateThemeIcons();
        }

        let lastScroll = 0;
        const header = document.getElementById('mainHeader');
        
        window.addEventListener('scroll', () => {
            if (window.scrollY > 50) header.classList.add('scrolled');
            else header.classList.remove('scrolled');

            if (window.innerWidth > 768) return;
            const currentScroll = window.pageYOffset;
            if (currentScroll > lastScroll && currentScroll > 100) {
                header.classList.add('hide-mobile');
            } else {
                header.classList.remove('hide-mobile');
            }
            lastScroll = currentScroll;
        });
    </script>
