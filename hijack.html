<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Gio Billboard</title>
<style>
body{
    margin:0;
    background:black;
    color:white;
    font-family:Arial, Helvetica, sans-serif;
    display:flex;
    justify-content:center;
    align-items:center;
    height:100vh;
}

.billboard{
    text-align:center;
    border:8px solid #1e90ff;
    padding:60px;
    max-width:900px;
    background:#0a0a0a;
    box-shadow:0 0 40px #1e90ff;
}

.top{
    font-size:32px;
    color:#aaa;
    margin-bottom:30px;
}

.logo{
    width:400px;
    margin-bottom:20px;
}

.desc{
    font-size:22px;
    margin-bottom:30px;
}

.link{
    font-size:28px;
    color:#00b7ff;
    font-weight:bold;
    margin-bottom:30px;
}

.button{
    display:inline-block;
    padding:14px 30px;
    font-size:20px;
    background:#1e90ff;
    color:white;
    text-decoration:none;
    border-radius:8px;
    transition:0.2s;
}

.button:hover{
    background:#3aa0ff;
}

.footer{
    margin-top:30px;
    font-size:14px;
    color:#999;
}
</style>
</head>

<body>

<div class="billboard">
<div class="top">I hijacked this session lol.. not really</div>

<img src="Gio.png" class="logo">

<div class="desc">
Breaking news. Live weather. Community alerts.<br>
Powered by Gio.
</div>

<div class="link">
g-man.gionews.workers.dev
</div>

<a href="index.html" class="button">Visit My Site :)</a>

<div class="footer">
Press F11 to escape
</div>

</div>

</body>
</html>
